services:
  digest:
    image: ghcr.io/rensite/dailydigest:latest
    container_name: daily-digest
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    networks:
      - proxy

# HTTPS и маршрутизация по доменам — через общий Caddy (стек ~/proxy),
# который владеет 80/443 на весь сервер. Здесь только подключаемся к его сети.
networks:
  proxy:
    external: true
